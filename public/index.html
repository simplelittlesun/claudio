<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claudio FM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #07091a;
      --bg-glow:      rgba(99, 102, 241, 0.07);
      --card-top:     #0f172a;
      --card-body:    #ffffff;
      --accent:       #818cf8;
      --accent-warm:  #c8956c;
      --wave:         rgba(255, 255, 255, 0.55);
      --wave-peak:    rgba(255, 255, 255, 0.9);
      --on-dark:      #e2e8f0;
      --muted-dark:   rgba(226, 232, 240, 0.35);
      --on-light:     #0f172a;
      --muted-light:  #94a3b8;
      --border-card:  rgba(255, 255, 255, 0.06);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── ambient background ── */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      top: -120px; left: -100px;
      background: radial-gradient(circle, rgba(99,102,241,0.12) 0%, transparent 70%);
    }
    body::after {
      width: 400px; height: 400px;
      bottom: -80px; right: -80px;
      background: radial-gradient(circle, rgba(200,149,108,0.1) 0%, transparent 70%);
    }

    /* ── scene ── */
    .scene {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 5rem;
      gap: 1.25rem;
    }

    /* ── card ── */
    .card {
      width: 100%;
      max-width: 360px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px var(--border-card),
        0 40px 80px rgba(0, 0, 0, 0.55),
        0 8px 24px rgba(0, 0, 0, 0.4);
    }

    /* card – dark top */
    .card-top {
      background: var(--card-top);
      padding: 1.25rem 1.5rem 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .card-top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .show-badge {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
    }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted-dark);
    }

    .live-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
    }
    .live-dot.on { animation: livepulse 2s ease-in-out infinite; }

    @keyframes livepulse {
      0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(129,140,248,0.6); }
      50%      { opacity: 0.4; box-shadow: 0 0 0 4px rgba(129,140,248,0); }
    }

    /* waveform */
    .waveform {
      display: flex;
      align-items: flex-end;
      gap: 2.5px;
      height: 52px;
    }

    .bar {
      flex: 1;
      background: var(--wave);
      border-radius: 2px 2px 1px 1px;
      min-height: 3px;
      transform-origin: bottom;
      transition: height 0.3s ease;
    }

    .bar.playing {
      animation: barwave var(--dur, 0.8s) ease-in-out var(--delay, 0s) infinite alternate;
    }

    @keyframes barwave {
      from { height: 3px;         opacity: 0.4; }
      to   { height: var(--peak); opacity: 0.9; }
    }

    /* card – white body */
    .card-body {
      background: var(--card-body);
      padding: 1.5rem 1.75rem 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .now-label {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted-light);
      margin-bottom: 0.5rem;
    }

    .track-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      font-weight: 500;
      line-height: 1.2;
      color: var(--on-light);
      margin-bottom: 0.35rem;
    }

    .track-artist {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted-light);
      margin-bottom: 1.4rem;
    }

    /* progress */
    .progress-wrap { margin-bottom: 0.45rem; }

    .progress-track {
      width: 100%;
      height: 1.5px;
      background: #e2e8f0;
      border-radius: 1px;
      cursor: pointer;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent-warm);
      border-radius: 1px;
      transition: width 1s linear;
    }

    .progress-times {
      display: flex;
      justify-content: space-between;
      font-size: 0.6rem;
      color: var(--muted-light);
      margin-top: 0.4rem;
      letter-spacing: 0.04em;
    }

    /* controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 1.2rem;
    }

    .btn-skip {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e1;
      padding: 0.3rem;
      display: flex;
      transition: color 0.2s;
    }
    .btn-skip:hover { color: var(--on-light); }

    .btn-play {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: var(--on-light);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-play:hover  { background: #1e293b; }
    .btn-play:active { transform: scale(0.94); }

    /* ── chat bubble ── */
    .bubble {
      width: 100%;
      max-width: 360px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 1rem 1.25rem 1.1rem;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      position: relative;
    }

    .bubble::before {
      content: '';
      position: absolute;
      top: -7px; left: 24px;
      width: 12px; height: 12px;
      background: rgba(255,255,255,0.05);
      border-left: 1px solid rgba(255,255,255,0.08);
      border-top: 1px solid rgba(255,255,255,0.08);
      transform: rotate(45deg);
    }

    .bubble-meta {
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.55rem;
      font-weight: 500;
    }

    .bubble-text {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 0.88rem;
      line-height: 1.75;
      color: rgba(226, 232, 240, 0.75);
      min-height: 1.5em;
    }

    .bubble-cursor {
      display: inline-block;
      width: 1px;
      height: 0.9em;
      background: var(--accent);
      vertical-align: text-bottom;
      margin-left: 1px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0; }
    }

    /* ── bottom progress bar ── */
    .bottom-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 2.5px;
      background: rgba(255,255,255,0.06);
      z-index: 100;
    }

    .bottom-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent-warm) 100%);
      transition: width 1s linear;
    }
  </style>
</head>
<body>

  <div class="scene">

    <div class="card">
      <div class="card-top">
        <div class="card-top-bar">
          <span class="show-badge">Claudio FM</span>
          <span class="live-badge">
            <span class="live-dot" id="liveDot"></span>
            On Air
          </span>
        </div>
        <div class="waveform" id="waveform"></div>
      </div>

      <div class="card-body">
        <div class="now-label">Now Playing</div>
        <div class="track-title"  id="trackTitle">—</div>
        <div class="track-artist" id="trackArtist">—</div>

        <div class="progress-wrap">
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-times">
            <span id="timeElapsed">0:00</span>
            <span id="timeDuration">—</span>
          </div>
        </div>

        <div class="controls">
          <button class="btn-skip" onclick="prevTrack()" title="上一首">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/>
            </svg>
          </button>

          <button class="btn-play" id="btnPlay" onclick="togglePlay()">
            <svg id="iconPlay"  width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <svg id="iconPause" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
          </button>

          <button class="btn-skip" onclick="nextTrack()" title="下一首">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="bubble" id="bubble">
      <div class="bubble-meta">Claudio &bull; <span id="bubbleTime"></span></div>
      <p class="bubble-text" id="bubbleText"><span class="bubble-cursor"></span></p>
    </div>

  </div>

  <div class="bottom-bar">
    <div class="bottom-fill" id="bottomFill"></div>
  </div>

  <script>
    /* ── waveform bars ── */
    const waveform = document.getElementById('waveform');
    const BAR_COUNT = 36;
    const bars = [];

    for (let i = 0; i < BAR_COUNT; i++) {
      const bar = document.createElement('div');
      bar.className = 'bar';
      const peak = 10 + Math.random() * 42;
      const dur  = (0.55 + Math.random() * 0.6).toFixed(2);
      const del  = (Math.random() * 0.6).toFixed(2);
      bar.style.cssText = `--peak:${peak}px; --dur:${dur}s; --delay:${del}s; height:3px;`;
      waveform.appendChild(bar);
      bars.push(bar);
    }

    /* ── state ── */
    let playing = false;

    const liveDot    = document.getElementById('liveDot');
    const iconPlay   = document.getElementById('iconPlay');
    const iconPause  = document.getElementById('iconPause');
    const trackTitle  = document.getElementById('trackTitle');
    const trackArtist = document.getElementById('trackArtist');
    const progressFill = document.getElementById('progressFill');
    const bottomFill   = document.getElementById('bottomFill');
    const bubbleText   = document.getElementById('bubbleText');
    const bubbleTime   = document.getElementById('bubbleTime');

    /* ── typewriter ── */
    let typeTimer = null;

    function typewrite(text) {
      clearTimeout(typeTimer);
      bubbleText.innerHTML = '<span class="bubble-cursor"></span>';
      let i = 0;
      const cursor = bubbleText.querySelector('.bubble-cursor');

      function step() {
        if (i < text.length) {
          cursor.insertAdjacentText('beforebegin', text[i++]);
          typeTimer = setTimeout(step, 42 + Math.random() * 30);
        }
      }
      step();
    }

    /* ── play / pause ── */
    function togglePlay() {
      playing = !playing;
      bars.forEach(b => b.classList.toggle('playing', playing));
      liveDot.classList.toggle('on', playing);
      iconPlay.style.display  = playing ? 'none'  : 'block';
      iconPause.style.display = playing ? 'block' : 'none';
    }

    /* ── simulated progress ── */
    let progress = 0;
    let elapsed  = 0;
    const duration = 242; // seconds, placeholder

    setInterval(() => {
      if (!playing) return;
      elapsed = Math.min(elapsed + 1, duration);
      progress = (elapsed / duration) * 100;
      progressFill.style.width = progress + '%';
      bottomFill.style.width   = progress + '%';
      document.getElementById('timeElapsed').textContent = fmt(elapsed);
    }, 1000);

    function fmt(s) {
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2,'0')}`;
    }

    /* ── load now playing ── */
    async function loadNow() {
      try {
        const res  = await fetch('/api/now');
        const data = await res.json();
        trackTitle.textContent  = data.title  ?? data.track  ?? '—';
        trackArtist.textContent = data.artist ?? '—';
        document.getElementById('timeDuration').textContent = fmt(duration);

        const now  = new Date();
        const time = now.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false });
        bubbleTime.textContent = time;

        if (data.say) typewrite(data.say);
      } catch {
        trackTitle.textContent  = '魚';
        trackArtist.textContent = '陳綺貞 (Cheer Chen)';
        bubbleTime.textContent  = '--:--';
        typewrite('窗外應該已經有光了。這首歌很適合你還沒完全醒來的那幾分鐘——陳綺貞的〈魚〉。');
      }
    }

    function prevTrack() { /* 串接 Claude 後實作 */ }
    function nextTrack() { /* 串接 Claude 後實作 */ }

    loadNow();
  </script>
</body>
</html>
